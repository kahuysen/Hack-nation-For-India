# Treatments / procedures
#
# Normalized concepts for the free-text `procedure` claim field
# (produced by starter_materials/free_form.py — self-contained English sentences
# like "Performs emergency cesarean sections").
#
# `keywords` are lowercase substrings for matching claim sentences; they include
# Indian-English variants (LSCS, sonography, OT...). Match case-insensitively.
# `performed_by` → specialties.yaml ids. `requires_equipment` → equipment.yaml ids
# (equipment whose presence corroborates the procedure claim, and vice versa).
#
# care_level: primary | secondary | tertiary — lowest tier of the Indian public
# system where the procedure is expected (aligned loosely with IPHS norms).

procedures:
  # ── General / outpatient ──────────────────────────────────────
  - id: outpatient-consultation
    label: Outpatient consultation (OPD)
    category: general
    care_level: primary
    keywords: [opd, outpatient, consultation, general checkup, health checkup]
    performed_by: [internalMedicine, familyMedicine]
    requires_equipment: []

  - id: inpatient-admission
    label: Inpatient admission (IPD)
