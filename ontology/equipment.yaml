# Equipment & infrastructure
#
# Normalized concepts for the free-text `equipment` claim field
# (produced by starter_materials/free_form.py — sentences like
# "Has Siemens SOMATOM Force dual-source CT scanner").
#
# `keywords` are lowercase substrings for matching claim sentences (includes
# brand names commonly seen in Indian facility pages — a brand/model mention is
# stronger evidence than a generic term).
# `enables` → procedures.yaml ids: procedures this equipment makes possible.
# The reverse edge (procedure → requires_equipment) lives in procedures.yaml;
# together they form the corroboration graph.
#
# tier: basic | intermediate | advanced — rough capital-intensity tier.
# Advanced equipment claims deserve more scrutiny (and more corroboration
# credit) than basic ones: an unverified "MRI" claim is a bigger deal than
# an unverified "ECG machine".

equipment:
  # ── Imaging ───────────────────────────────────────────────────
  - id: xray-machine
    label: X-ray machine
    category: imaging
    tier: basic
    keywords: [x-ray, xray, radiography, digital radiography, dr system]
    enables: [xray-imaging, fracture-fixation]

  - id: ultrasound-machine
    label: Ultrasound / sonography machine
    category: imaging
    tier: basic
    keywords: [ultrasound, sonography, usg machine, doppler, sonosite, voluson]
