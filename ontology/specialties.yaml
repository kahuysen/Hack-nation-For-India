# Doctor types / medical specialties
#
# `id` matches the dataset's camelCase `specialties` vocabulary exactly
# (the closed vocabulary used by starter_materials/medical_specialties.py).
# `in_prompt_vocab: true` means the id is directly evidenced in that prompt's
# mapping rules; entries with `false` are plausible members of the unpublished
# level-0/1 hierarchy — verify against actual dataset values before relying on them.
#
# Cross-links reference ids in procedures.yaml and equipment.yaml.
# `corroborating_*` lists answer: "if this specialty claim is real, what should
# we expect to see in the facility's procedure/equipment claims?"
#
# care_level: primary | secondary | tertiary — the lowest tier of the Indian
# public system (PHC / CHC-district hospital / medical college & specialty
# hospital) where the specialty is typically available.

specialties:
  # ── Primary / generalist medicine ─────────────────────────────
  - id: internalMedicine
    label: Internal medicine (general physician)
    group: medicine
    in_prompt_vocab: true
    care_level: primary
    synonyms: [general medicine, physician, medical, MD medicine, general hospital]
    note: Default assigned to any generic "Hospital / Medical Center" name — weakest evidentiary value of all specialties.
    corroborating_procedures: [outpatient-consultation, inpatient-admission, lab-diagnostics]
    corroborating_equipment: [ecg-machine, laboratory-analyzer, patient-beds]

  - id: familyMedicine
    label: Family medicine (general practice)
    group: medicine
    in_prompt_vocab: true
    care_level: primary
    synonyms: [general practice, GP, family physician, community clinic]
    note: Default assigned to any generic "Clinic" name.
    corroborating_procedures: [outpatient-consultation, immunization, minor-wound-care]
    corroborating_equipment: [ecg-machine]

  - id: emergencyMedicine
    label: Emergency medicine
    group: medicine
    in_prompt_vocab: true
    care_level: secondary
    synonyms: [ER, ED, emergency department, casualty, 24x7 emergency, emergency medical services]
    corroborating_procedures: [emergency-resuscitation, minor-wound-care, fracture-fixation]
    corroborating_equipment: [defibrillator, ventilator, ambulance, oxygen-supply]

  - id: criticalCareMedicine
    label: Critical care medicine (incl. trauma)
    group: medicine
    in_prompt_vocab: true
    care_level: tertiary
    synonyms: [ICU, intensive care, trauma, trauma center, intensivist]
    note: The extraction prompt maps "Trauma" here, not to emergencyMedicine or surgery.
    corroborating_procedures: [mechanical-ventilation, emergency-resuscitation]
    corroborating_equipment: [ventilator, patient-monitor, defibrillator, icu-beds, oxygen-supply]

  # ── Medical (adult) subspecialties ────────────────────────────
  - id: cardiology
    label: Cardiology
    group: medicine
    in_prompt_vocab: true
    care_level: tertiary
    synonyms: [heart, cardiac (non-surgical), cardiologist, heart center]
    corroborating_procedures: [echocardiography, angiography, angioplasty-pci, stress-testing]
    corroborating_equipment: [ecg-machine, echo-machine, cath-lab, patient-monitor]

  - id: nephrology
    label: Nephrology
    group: medicine
    in_prompt_vocab: true
    care_level: tertiary
    synonyms: [kidney, renal, nephrologist]
    corroborating_procedures: [hemodialysis, peritoneal-dialysis]
    corroborating_equipment: [dialysis-machine, ro-water-plant]

  - id: medicalOncology
    label: Medical oncology
    group: medicine
    in_prompt_vocab: true
    care_level: tertiary
    synonyms: [oncology, cancer, cancer center, chemotherapy]
    note: Generic "Oncology / Cancer Center" maps here even if the facility mainly does surgery or radiotherapy.
    corroborating_procedures: [chemotherapy, cancer-screening, biopsy]
    corroborating_equipment: [chemotherapy-infusion-unit, laboratory-analyzer]

  - id: endocrinologyAndDiabetesAndMetabolism
    label: Endocrinology, diabetes & metabolism
    group: medicine
    in_prompt_vocab: true
    care_level: secondary
    synonyms: [endocrinology, diabetes, diabetology, thyroid, hormone]
    corroborating_procedures: [lab-diagnostics, outpatient-consultation]
    corroborating_equipment: [laboratory-analyzer]

  - id: infectiousDiseases
    label: Infectious diseases
    group: medicine
    in_prompt_vocab: true
    care_level: secondary
    synonyms: [infectious, tropical diseases, TB, tuberculosis, HIV, fever clinic, DOTS]
    corroborating_procedures: [lab-diagnostics, immunization]
    corroborating_equipment: [laboratory-analyzer, isolation-ward]

  - id: geriatricsInternalMedicine
    label: Geriatrics
    group: medicine
    in_prompt_vocab: true
    care_level: secondary
    synonyms: [geriatric, elderly care, old age]
    corroborating_procedures: [outpatient-consultation, physiotherapy]
    corroborating_equipment: [patient-beds]

  - id: hospiceAndPalliativeInternalMedicine
    label: Hospice & palliative medicine
    group: medicine
    in_prompt_vocab: true
    care_level: secondary
    synonyms: [palliative, hospice, end-of-life care, pain and palliative]
